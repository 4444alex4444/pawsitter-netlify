<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8F0"/>
      <stop offset="0.45" stop-color="#FFF4EB"/>
      <stop offset="1" stop-color="#F0F8F5"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <style>
      .soft { opacity: .16; }
      .paw { fill: #E9C8B8; opacity: .22; }
      .dog { stroke: #D9C6B8; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; opacity: .23; fill: none; }
      .cat { stroke: #DCC7B8; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; opacity: .20; fill: none; }
      .bird { stroke: #D9D4C8; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; opacity: .18; fill: none; }
      .blob1 { fill: #FFE1D0; opacity: .17; }
      .blob2 { fill: #DDF3EA; opacity: .18; }
      .blob3 { fill: #F7E7D8; opacity: .22; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>

  <ellipse class="blob1" cx="245" cy="188" rx="210" ry="120" filter="url(#blur)"/>
  <ellipse class="blob2" cx="1365" cy="242" rx="230" ry="150" filter="url(#blur)"/>
  <ellipse class="blob3" cx="1240" cy="1000" rx="240" ry="150" filter="url(#blur)"/>
  <ellipse class="blob2" cx="305" cy="970" rx="210" ry="130" filter="url(#blur)"/>

  <!-- soft silhouettes -->
  <g transform="translate(92 128) scale(1.2)">
    <path class="dog" d="M56 116 L96 116 L113 97 L143 96 L158 74 L145 54 L156 28 L141 28 L125 44 L100 38 L83 50 L62 50 L42 65 L42 87 L31 97 L31 116 L44 116"/>
    <path class="dog" d="M77 116 L72 148 M128 116 L132 148"/>
    <path class="dog" d="M136 46 L166 54"/>
    <circle cx="134" cy="66" r="3" fill="#D9C6B8" opacity=".25"/>
  </g>

  <g transform="translate(1340 130) scale(1.15)">
    <path class="cat" d="M34 118 L86 118 L103 100 L122 100 L141 83 L141 63 L129 53 L119 20 L101 40 L79 40 L65 20 L49 43 L34 50 L26 67 L26 86 L20 98 L20 118"/>
    <path class="cat" d="M52 118 L48 148 M104 118 L108 148"/>
    <path class="cat" d="M139 82 C171 87 181 102 180 126"/>
    <circle cx="104" cy="70" r="3" fill="#DCC7B8" opacity=".24"/>
  </g>

  <g transform="translate(102 940) scale(0.92)">
    <path class="bird" d="M14 48 C34 16 82 10 109 33 C129 50 133 79 116 98 C99 117 59 119 40 100 C23 83 21 61 33 50"/>
    <path class="bird" d="M106 48 C129 48 150 40 166 24"/>
    <path class="bird" d="M39 97 L26 129 M66 101 L61 132"/>
    <path class="bird" d="M14 52 L0 44"/>
  </g>

  <!-- paw prints -->
  <g transform="translate(1260 610) rotate(-18)">
    <g class="paw">
      <ellipse cx="0" cy="0" rx="18" ry="14"/>
      <ellipse cx="-16" cy="-20" rx="7" ry="10"/>
      <ellipse cx="2" cy="-26" rx="7" ry="10"/>
      <ellipse cx="20" cy="-18" rx="7" ry="10"/>
      <ellipse cx="28" cy="2" rx="6" ry="9"/>
    </g>
    <g class="paw" transform="translate(66 52) scale(.85)">
      <ellipse cx="0" cy="0" rx="18" ry="14"/>
      <ellipse cx="-16" cy="-20" rx="7" ry="10"/>
      <ellipse cx="2" cy="-26" rx="7" ry="10"/>
      <ellipse cx="20" cy="-18" rx="7" ry="10"/>
      <ellipse cx="28" cy="2" rx="6" ry="9"/>
    </g>
  </g>

  <g transform="translate(220 680) rotate(16)">
    <g class="paw" opacity=".18">
      <ellipse cx="0" cy="0" rx="16" ry="13"/>
      <ellipse cx="-14" cy="-18" rx="6" ry="9"/>
      <ellipse cx="1" cy="-24" rx="6" ry="9"/>
      <ellipse cx="18" cy="-16" rx="6" ry="9"/>
      <ellipse cx="25" cy="1" rx="5" ry="8"/>
    </g>
  </g>

  <g transform="translate(1440 980) rotate(12)">
    <g class="paw" opacity=".16">
      <ellipse cx="0" cy="0" rx="15" ry="12"/>
      <ellipse cx="-13" cy="-18" rx="6" ry="8"/>
      <ellipse cx="0" cy="-23" rx="6" ry="8"/>
      <ellipse cx="16" cy="-16" rx="6" ry="8"/>
      <ellipse cx="22" cy="0" rx="5" ry="7"/>
    </g>
  </g>
</svg>
